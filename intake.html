<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niste – Diepgaande woonintake</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:"Plus Jakarta Sans";background:#f6f2ed;margin:0;}
.container{max-width:1100px;margin:40px auto;padding:20px;}
.section{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;}
h1,h2{font-family:"Cormorant Garamond";}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}
input,select,textarea{padding:12px;border-radius:10px;border:1px solid #ddd;width:100%;}
textarea{min-height:100px;}
button{background:#8a6a45;color:white;padding:14px;border:none;border-radius:12px;}
.summary{background:#eee;padding:15px;border-radius:10px;}
</style>
</head>

<body>
<div class="container">

<h1>Niste – Woning & Woonbehoefte intake</h1>

<form id="form">

<!-- ===================== -->
<!-- HUISHOUDEN -->
<!-- ===================== -->
<div class="section">
<h2>Huishouden</h2>
<div class="grid">
<input id="age" placeholder="Leeftijd hoofdbewoner">
<input id="household" placeholder="Aantal personen huishouden">
<input id="children" placeholder="Aantal kinderen">
<input id="lifeStage" placeholder="Levensfase (starter / gezin / empty nester)">
<textarea id="changes" class="full" placeholder="Welke veranderingen verwacht je komende 5 jaar?"></textarea>
</div>
</div>

<!-- ===================== -->
<!-- HUIDIGE WONING -->
<!-- ===================== -->
<div class="section">
<h2>Huidige woning (objectief + gevoel)</h2>
<div class="grid">

<input id="city" placeholder="Plaats">
<input id="type" placeholder="Type woning">

<input id="m2" placeholder="m²">
<input id="rooms" placeholder="kamers">

<select id="energy">
<option>Energielabel</option>
<option>A</option><option>B</option><option>C</option>
<option>D</option><option>E</option><option>F</option>
</select>

<select id="satisfaction">
<option>Tevredenheid woning</option>
<option>1 - slecht</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5 - perfect</option>
</select>

<textarea id="likes" class="full" placeholder="Wat waardeer je het meest aan je woning?"></textarea>
<textarea id="pain" class="full" placeholder="Wat zijn de grootste frustraties?"></textarea>

<textarea id="emotion" class="full" placeholder="Wat betekent deze woning emotioneel voor je?"></textarea>

</div>
</div>

<!-- ===================== -->
<!-- VERHUISREDEN -->
<!-- ===================== -->
<div class="section">
<h2>Waarom wil je veranderen?</h2>
<div class="grid">

<select id="trigger">
<option>Hoofdreden</option>
<option>Te groot</option>
<option>Te klein</option>
<option>Onderhoud</option>
<option>Locatie</option>
<option>Financieel</option>
</select>

<textarea id="realReason" class="full" placeholder="Wat is de échte reden achter je verhuiswens?"></textarea>

<select id="urgency">
<option>Urgentie</option>
<option>Laag</option>
<option>Middel</option>
<option>Hoog</option>
</select>

</div>
</div>

<!-- ===================== -->
<!-- WOONWENSEN -->
<!-- ===================== -->
<div class="section">
<h2>Ideale woning</h2>
<div class="grid">

<input id="desiredM2" placeholder="Gewenste m²">
<input id="desiredRooms" placeholder="Gewenste kamers">

<select id="desiredType">
<option>Type woning</option>
<option>Appartement</option>
<option>Huis</option>
<option>Seniorenwoning</option>
</select>

<select id="mustHave">
<option>Belangrijkste must-have</option>
<option>Tuin</option>
<option>Gelijkvloers</option>
<option>Locatie</option>
<option>Prijs</option>
</select>

<textarea id="dream" class="full" placeholder="Beschrijf je ideale woning zo concreet mogelijk"></textarea>

</div>
</div>

<!-- ===================== -->
<!-- LOCATIE -->
<!-- ===================== -->
<div class="section">
<h2>Locatievoorkeur</h2>
<div class="grid">

<input id="preferredCity" placeholder="Voorkeursplaats">
<input id="radius" placeholder="Max afstand (km)">

<select id="mustStay">
<option>Moet je in dezelfde plaats blijven?</option>
<option>Ja</option>
<option>Nee</option>
</select>

<textarea id="locationWhy" class="full" placeholder="Waarom deze locatie?"></textarea>

</div>
</div>

<!-- ===================== -->
<!-- FINANCIEEL -->
<!-- ===================== -->
<div class="section">
<h2>Financieel</h2>
<div class="grid">

<input id="budget" placeholder="Budget">
<input id="equity" placeholder="Overwaarde (inschatting)">

<select id="flexibility">
<option>Financiële flexibiliteit</option>
<option>Strak budget</option>
<option>Enigszins flexibel</option>
<option>Flexibel</option>
</select>

</div>
</div>

<!-- ===================== -->
<!-- DOORSTROOM -->
<!-- ===================== -->
<div class="section">
<h2>Doorstroom (belangrijk!)</h2>
<div class="grid">

<select id="sell">
<option>Ga je verkopen?</option>
<option>Ja</option>
<option>Nee</option>
</select>

<select id="timeline">
<option>Tijdlijn verkoop</option>
<option>Direct</option>
<option>6 maanden</option>
<option>1 jaar</option>
</select>

<textarea id="barrier" class="full" placeholder="Wat houdt je nu tegen om te verhuizen?"></textarea>

</div>
</div>

<!-- ===================== -->
<!-- SAMENVATTING -->
<!-- ===================== -->
<div class="section">
<h2>Profiel & samenvatting</h2>
<div id="summary" class="summary"></div>
<br>
<button type="submit">Opslaan</button>
</div>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"VUL_IN",
  authDomain:"VUL_IN",
  projectId:"VUL_IN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");
const summary = document.getElementById("summary");

function g(id){return document.getElementById(id).value;}

function update(){

const profile = `
Profiel:
${g("lifeStage")} huishouden van ${g("household")} personen.

Huidige woning:
${g("type")} in ${g("city")} (${g("m2")}m²).
Tevredenheid: ${g("satisfaction")}

Probleem:
${g("realReason")}

Wens:
${g("desiredType")} van ${g("desiredM2")}m² in ${g("preferredCity")}

Barrière:
${g("barrier")}
`;

summary.innerText = profile;
}

document.querySelectorAll("input,select,textarea").forEach(el=>{
  el.addEventListener("input",update);
});

form.addEventListener("submit", async(e)=>{
  e.preventDefault();

  const data = {
    household:{
      age:g("age"),
      size:g("household"),
      children:g("children"),
      lifeStage:g("lifeStage"),
      future:g("changes")
    },
    current:{
      city:g("city"),
      type:g("type"),
      m2:g("m2"),
      rooms:g("rooms"),
      energy:g("energy"),
      satisfaction:g("satisfaction"),
      likes:g("likes"),
      pain:g("pain"),
      emotion:g("emotion")
    },
    motivation:{
      trigger:g("trigger"),
      realReason:g("realReason"),
      urgency:g("urgency")
    },
    needs:{
      desiredM2:g("desiredM2"),
      desiredRooms:g("desiredRooms"),
      type:g("desiredType"),
      must:g("mustHave"),
      dream:g("dream")
    },
    location:{
      preferred:g("preferredCity"),
      radius:g("radius"),
      mustStay:g("mustStay"),
      reason:g("locationWhy")
    },
    financial:{
      budget:g("budget"),
      equity:g("equity"),
      flexibility:g("flexibility")
    },
    flow:{
      sell:g("sell"),
      timeline:g("timeline"),
      barrier:g("barrier")
    },
    summary:summary.innerText,
    createdAt:serverTimestamp()
  };

  await addDoc(collection(db,"intakes"),data);

  alert("Opgeslagen 🚀");
});

</script>

</body>
</html>
