<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niste – Intake</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Plus Jakarta Sans';
  background: #F5F0E8;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

.step { display:none; }
.step.active { display:block; }

input, select, textarea {
  width:100%;
  padding:14px;
  margin-bottom:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1E2A38;
  color:white;
}

.progress {
  height:6px;
  background:#ddd;
  margin-bottom:20px;
}

.bar {
  height:6px;
  background:#C6A87D;
  width:0%;
}
</style>
</head>

<body>

<div class="container">
<h1>Intake</h1>
<div class="progress"><div class="bar" id="bar"></div></div>

<!-- STEP 1 -->
<div class="step active">
<h2>Woning basis</h2>

<label>Type</label>
<select id="type">
<option>Tussenwoning</option>
<option>Hoekwoning</option>
<option>Vrijstaand</option>
<option>Appartement</option>
</select>

<label>Bouwjaar</label>
<input id="bouwjaar" type="number">

<label>m²</label>
<input id="m2" type="number">

<button onclick="next()">Volgende</button>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Techniek</h2>

<label>Energielabel</label>
<select id="label">
<option>A</option><option>B</option><option>C</option>
<option>D</option><option>E</option>
</select>

<label>Zonnepanelen (aantal)</label>
<input id="panelen" type="number">

<label>Isolatie</label>
<select id="isolatie">
<option>Goed</option>
<option>Gemiddeld</option>
<option>Slecht</option>
</select>

<label>CV / Warmtepomp</label>
<select id="verwarming">
<option>CV</option>
<option>Warmtepomp</option>
</select>

<label>Elektra vernieuwd?</label>
<select id="elektra">
<option>Ja</option><option>Nee</option>
</select>

<button onclick="next()">Volgende</button>
</div>

<!-- STEP 3 -->
<div class="step">
<h2>Onderhoud</h2>

<label>Laatste renovatie</label>
<input id="renovatie">

<label>Keuken staat</label>
<select id="keuken">
<option>Nieuw</option>
<option>Redelijk</option>
<option>Oud</option>
</select>

<label>Badkamer staat</label>
<select id="badkamer">
<option>Nieuw</option>
<option>Redelijk</option>
<option>Oud</option>
</select>

<button onclick="next()">Volgende</button>
</div>

<!-- STEP 4 -->
<div class="step">
<h2>Wensen</h2>

<label>Gewenste plaats</label>
<input id="plaats">

<label>Budget max</label>
<input id="budget">

<label>Min m²</label>
<input id="minm2">

<label>Must-haves</label>
<textarea id="must"></textarea>

<button onclick="save()">Opslaan</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "JOUW_KEY",
  projectId: "JOUW_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.save = async function() {
  const data = {
    type: type.value,
    bouwjaar: bouwjaar.value,
    m2: m2.value,
    label: label.value,
    panelen: panelen.value,
    isolatie: isolatie.value,
    verwarming: verwarming.value,
    elektra: elektra.value,
    renovatie: renovatie.value,
    keuken: keuken.value,
    badkamer: badkamer.value,
    plaats: plaats.value,
    budget: budget.value,
    minm2: minm2.value,
    must: must.value,
    created: new Date()
  };

  await addDoc(collection(db, "intakes"), data);

  window.location.href = "dashboard.html";
}
</script>

<script>
let i=0;
const steps=document.querySelectorAll(".step");

function next(){
  steps[i].classList.remove("active");
  i++;
  steps[i].classList.add("active");
  document.getElementById("bar").style.width=((i+1)/steps.length*100)+"%";
}
</script>

</body>
</html>
