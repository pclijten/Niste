<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niste – Jouw nieuwe stek</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; margin:0; background:#F6F1E9; }

nav {
  position:fixed; top:0; width:100%; padding:20px 40px;
  background:rgba(255,255,255,0.9); display:flex; justify-content:space-between;
}

.hero { padding:120px 40px; }

.btn {
  background:#2A4A3E; color:white; padding:12px 20px;
  border-radius:999px; cursor:pointer; border:none;
}

.login-box {
  background:white; padding:20px; border-radius:12px;
  max-width:300px;
}
</style>
</head>

<body>

<nav>
  <div><strong>Niste</strong></div>
  <div>
    <a href="#aanmelden">Aanmelden</a>
  </div>
</nav>

<section class="hero">
  <h1>Jouw volgende thuis</h1>
  <p>Vind je perfecte woningruil</p>
</section>

<!-- LOGIN -->
<section id="aanmelden" style="padding:40px;">
  <div class="login-box">

    <div id="status">Niet ingelogd</div>

    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Wachtwoord"><br><br>

    <button class="btn" onclick="register()">Account maken</button><br><br>
    <button class="btn" onclick="login()">Login</button><br><br>
    <button class="btn" onclick="loginGoogle()">Google login</button>

  </div>
</section>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkrkHrPW4pPu0_ZVKGma-AVF4-gTtk9R8",
  authDomain: "niste-1113e.firebaseapp.com",
  projectId: "niste-1113e",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, password);

  // 👉 DIRECT NAAR INTAKE (FIXED)
  window.location.href = "intake.html";
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);

  // 👉 DIRECT NAAR DASHBOARD (FIXED)
  window.location.href = "dashboard.html";
};

window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);

  window.location.href = "intake.html";
};

onAuthStateChanged(auth, user => {
  const status = document.getElementById("status");

  if (user) {
    status.innerHTML = "Ingelogd als " + user.email;
  } else {
    status.innerHTML = "Niet ingelogd";
  }
});
</script>

</body>
</html>
