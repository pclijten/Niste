<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoonMatch</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

  <style>
    body { background: #0f172a; color: white; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="max-w-2xl w-full p-6">

  <!-- HERO -->
  <h1 class="text-4xl font-bold mb-4">🏡 WoonMatch</h1>
  <p class="text-gray-300 mb-8">
    Vind jouw perfecte woningmatch en help de woningmarkt doorstromen.
  </p>

  <!-- FORM -->
  <div class="bg-white text-black p-6 rounded-2xl shadow-xl">

    <form id="form" class="space-y-4">

      <input type="text" id="naam" placeholder="Naam" class="w-full p-3 border rounded" required>
      <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded" required>

      <input type="text" id="huidige" placeholder="Huidige woning" class="w-full p-3 border rounded">
      <input type="text" id="gewenste" placeholder="Gewenste woning" class="w-full p-3 border rounded">

      <select id="timing" class="w-full p-3 border rounded">
        <option value="">Wanneer wil je verhuizen?</option>
        <option>Binnen 6 maanden</option>
        <option>Binnen 1 jaar</option>
        <option>Oriënterend</option>
      </select>

      <button type="submit" class="w-full bg-black text-white p-3 rounded-xl">
        Vind mijn match
      </button>

    </form>

    <p id="status" class="mt-4 text-green-600 hidden">Opgeslagen! We zoeken een match...</p>

    <div id="match" class="mt-4 text-blue-600 hidden"></div>

  </div>

</div>

<script>
  // 🔥 FIREBASE CONFIG (vervang dit!)
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // FORM SUBMIT
  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
      naam: naam.value,
      email: email.value,
      huidige: huidige.value,
      gewenste: gewenste.value,
      timing: timing.value,
      created: new Date()
    };

    // opslaan
    await db.collection("users").add(data);

    document.getElementById("status").classList.remove("hidden");

    // simpele matching
    findMatch(data);
  });

  async function findMatch(user) {
    const snapshot = await db.collection("users").get();

    let bestMatch = null;

    snapshot.forEach(doc => {
      const other = doc.data();

      if (other.email === user.email) return;

      // simpele match logica
      if (
        other.huidige?.toLowerCase().includes(user.gewenste?.toLowerCase()) &&
        other.gewenste?.toLowerCase().includes(user.huidige?.toLowerCase())
      ) {
        bestMatch = other;
      }
    });

    if (bestMatch) {
      document.getElementById("match").innerHTML =
        `🎯 Match gevonden met ${bestMatch.naam}! We nemen contact op.`;
    } else {
      document.getElementById("match").innerHTML =
        `⏳ Nog geen directe match. We blijven zoeken!`;
    }

    document.getElementById("match").classList.remove("hidden");
  }
</script>

</body>
</html>
